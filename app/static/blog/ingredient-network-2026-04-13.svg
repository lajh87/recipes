<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 920" role="img" aria-labelledby="title desc">
<title id="title">Ingredient co-occurrence network</title>
<desc id="desc">A network diagram showing ingredients as nodes and co-occurrence inside recipes as links. More central ingredients appear larger and warmer in colour.</desc>
